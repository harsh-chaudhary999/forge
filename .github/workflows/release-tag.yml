# Optional: create a git tag pointing at the current commit (does not bump versions).
# Version bumps stay in normal PRs to package.json / plugin manifests; this workflow only pushes a tag.
name: Tag release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v1.0.1 — must not exist yet)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push annotated tag
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Tag must look like v1.2.3" >&2
            exit 1
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists" >&2
            exit 1
          fi
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"
