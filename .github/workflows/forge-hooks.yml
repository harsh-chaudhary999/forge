name: forge-hooks

on:
  push:
    paths:
      - "scripts/install.sh"
      - "scripts/forge-doctor.sh"
      - "hooks/session-start"
      - "hooks/hooks.json"
      - ".claude/hooks/session-start.cjs"
      - ".claude/hooks/pre-tool-use.cjs"
      - ".claude/hooks/post-commit.cjs"
      - ".claude/hooks/prompt-submit.cjs"
      - ".claude/hooks/prompt-submit-gates.cjs"
      - ".claude/hooks/forge-stage-detect.cjs"
      - ".claude/hooks/test-forge-stage-detect.cjs"
      - "tools/**/*.py"
      - "tools/verify/**"
      - "tools/scan/**"
      - "tools/dev/**"
      - "tools/ops/**"
      - "tools/js/**"
      - "tools/scan_forge/**"
      - ".github/workflows/forge-hooks.yml"
  pull_request:
    paths:
      - "scripts/install.sh"
      - "scripts/forge-doctor.sh"
      - "hooks/session-start"
      - "hooks/hooks.json"
      - ".claude/hooks/session-start.cjs"
      - ".claude/hooks/pre-tool-use.cjs"
      - ".claude/hooks/post-commit.cjs"
      - ".claude/hooks/prompt-submit.cjs"
      - ".claude/hooks/prompt-submit-gates.cjs"
      - ".claude/hooks/forge-stage-detect.cjs"
      - ".claude/hooks/test-forge-stage-detect.cjs"
      - "tools/**/*.py"
      - "tools/verify/**"
      - "tools/scan/**"
      - "tools/dev/**"
      - "tools/ops/**"
      - "tools/js/**"
      - "tools/scan_forge/**"
      - ".github/workflows/forge-hooks.yml"

jobs:
  stage-detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install script bash syntax
        run: bash -n scripts/install.sh

      - name: forge-doctor script bash syntax
        run: bash -n scripts/forge-doctor.sh

      - name: forge_evidence_bundle.py syntax
        run: python3 -m py_compile tools/ops/forge_evidence_bundle.py

      - name: Stage marker unit tests
        run: node .claude/hooks/test-forge-stage-detect.cjs

      - name: Prompt submit gate resolution tests
        run: node tools/js/test-prompt-submit-gates.cjs

      - name: Load prompt-submit gates module (syntax)
        run: node --check .claude/hooks/prompt-submit-gates.cjs

      - name: Load prompt-submit hook (syntax)
        run: node --check .claude/hooks/prompt-submit.cjs

      - name: Load session-start hook (syntax)
        run: node --check .claude/hooks/session-start.cjs

      - name: Load pre-tool-use hook (syntax)
        run: node --check .claude/hooks/pre-tool-use.cjs

      - name: Load post-commit hook (syntax)
        run: node --check .claude/hooks/post-commit.cjs

  verify-forge-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML (eval scenario validation tests)
        run: pip install -r tools/verify/requirements-verify.txt

      - name: verify_forge_task + eval stdlib unit tests
        run: |
          set -e
          python3 -m unittest discover -s tools/verify -p "test_*.py" -v
          python3 -m unittest discover -s tools/dev -p "test_*.py" -v

  lint-skills-allowed-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: rigid skills must declare allowed-tools
        run: python3 tools/dev/lint_skill_allowed_tools.py

      - name: skill-tool-policy.json matches lint (no drift)
        run: |
          python3 tools/dev/lint_skill_allowed_tools.py --write-policy /tmp/skill-tool-policy.json
          diff -u tools/dev/skill-tool-policy.json /tmp/skill-tool-policy.json
