name: scan-codebase

on:
  push:
    paths:
      - "skills/scan-codebase/**"
      - "tools/forge_scan_run.py"
      - "tools/scan_forge/**"
      - ".github/workflows/scan-codebase.yml"
  pull_request:
    paths:
      - "skills/scan-codebase/**"
      - "tools/forge_scan_run.py"
      - "tools/scan_forge/**"
      - ".github/workflows/scan-codebase.yml"

jobs:
  scan-forge-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile scan_forge
        run: python3 -m compileall -q tools/scan_forge

      - name: Unit tests (scan_forge)
        run: PYTHONPATH=tools python3 -m unittest discover -s tools/scan_forge/tests -v

      - name: Smoke test (fixtures + forge_scan_run.py)
        run: python3 tools/scan_forge/verify_smoke.py
