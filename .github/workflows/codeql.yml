# Advanced CodeQL with explicit paths-ignore (see .github/codeql/codeql-config.yml).
# If your org already uses default code scanning for this repo, disable one to avoid duplicate runs.
name: CodeQL

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # No npm build / bundler — autobuild extracts nothing and finalize fails with exit 32.
          # https://gh.io/troubleshooting-code-scanning/no-source-code-seen-during-build
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - if: matrix.build-mode != 'none'
        uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
