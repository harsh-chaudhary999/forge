# Optional template: copy or adapt into your *brain* repository CI.
# This workflow lives in the Forge repo as a reference; brain repos often
# checkout Forge (sparse) or vendor tools/verify_forge_task.py.
#
# Required repo/organization variable: FORGE_TASK_ID (e.g. add-2fa).
# Optional env (repository or organization variables / secrets):
#   FORGE_STRICT_TDD=true — --strict-tdd
#   FORGE_CHECK_PRD_SECTIONS=true — --check-prd-sections (intake template headings)
#   FORGE_STRICT_SINGLE_TASK=true — --strict-single-task-brain (fail if multiple prds/*/conductor.log)
#   FORGE_REQUIRE_CONDUCTOR_TIMESTAMPS=true — --require-conductor-timestamps on phase lines
#   FORGE_DRIFT_STRICT=true — forge_drift_check.py --strict (success criteria vs eval/QA text)
#   FORGE_CHECK_SHARED_SPEC=true — --check-shared-spec
#   FORGE_VALIDATE_PHASE_LEDGER=true — --validate-phase-ledger
#   FORGE_REQUIRE_PHASE_LEDGER=true — --require-phase-ledger
#   FORGE_PHASE_LEDGER_VERIFY_HASHES=true — --phase-ledger-verify-hashes

name: Forge brain guard

on:
  workflow_dispatch:
  # Uncomment when FORGE_TASK_ID is set as a repo/org variable:
  # push:
  #   paths:
  #     - "prds/**"
  #     - "products/**"

jobs:
  verify:
    if: ${{ vars.FORGE_TASK_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout brain
        uses: actions/checkout@v4

      - name: Checkout Forge (verify script only)
        uses: actions/checkout@v4
        with:
          repository: harsh-chaudhary999/forge
          path: forge
          sparse-checkout: |
            tools/verify_forge_task.py
            tools/eval_yaml_stdlib.py
            tools/phase_ledger.py
            tools/shared_spec_policy.py
            tools/shared_spec_checklist.json
            tools/requirements-verify.txt
            tools/forge_drift_check.py
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verify extras (eval YAML schema)
        run: pip install -r forge/tools/requirements-verify.txt

      - name: Verify Forge task
        env:
          FORGE_TASK_ID: ${{ vars.FORGE_TASK_ID }}
        run: |
          set -euo pipefail
          if [ -z "${FORGE_TASK_ID:-}" ]; then
            echo "Set repository variable FORGE_TASK_ID (e.g. add-2fa) or pass via workflow_dispatch input." >&2
            exit 1
          fi
          EXTRA=""
          if [ "${FORGE_STRICT_TDD:-}" = "true" ]; then EXTRA="${EXTRA} --strict-tdd"; fi
          if [ "${FORGE_CHECK_PRD_SECTIONS:-}" = "true" ]; then EXTRA="${EXTRA} --check-prd-sections"; fi
          if [ "${FORGE_STRICT_SINGLE_TASK:-}" = "true" ]; then EXTRA="${EXTRA} --strict-single-task-brain"; fi
          if [ "${FORGE_REQUIRE_CONDUCTOR_TIMESTAMPS:-}" = "true" ]; then EXTRA="${EXTRA} --require-conductor-timestamps"; fi
          if [ "${FORGE_CHECK_SHARED_SPEC:-}" = "true" ]; then EXTRA="${EXTRA} --check-shared-spec"; fi
          if [ "${FORGE_VALIDATE_PHASE_LEDGER:-}" = "true" ]; then EXTRA="${EXTRA} --validate-phase-ledger"; fi
          if [ "${FORGE_REQUIRE_PHASE_LEDGER:-}" = "true" ]; then EXTRA="${EXTRA} --require-phase-ledger"; fi
          if [ "${FORGE_PHASE_LEDGER_VERIFY_HASHES:-}" = "true" ]; then EXTRA="${EXTRA} --phase-ledger-verify-hashes"; fi
          python3 forge/tools/verify_forge_task.py \
            --brain "${GITHUB_WORKSPACE}" \
            --task-id "${FORGE_TASK_ID}" \
            --require-log \
            --validate-eval-yaml \
            ${EXTRA}
          DRIFT_EXTRA=""
          if [ "${FORGE_DRIFT_STRICT:-}" = "true" ]; then DRIFT_EXTRA="--strict"; fi
          python3 forge/tools/forge_drift_check.py \
            --brain "${GITHUB_WORKSPACE}" \
            --task-id "${FORGE_TASK_ID}" \
            ${DRIFT_EXTRA}
