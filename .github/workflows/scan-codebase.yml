name: scan-codebase

on:
  push:
    paths:
      - "skills/scan-codebase/**"
      - "tools/**"
      - ".github/workflows/scan-codebase.yml"
  pull_request:
    paths:
      - "skills/scan-codebase/**"
      - "tools/**"
      - ".github/workflows/scan-codebase.yml"

jobs:
  scan-forge-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scan_forge dependencies
        run: python3 -m pip install -r tools/scan_forge/requirements.txt

      - name: Compile Python under tools/
        run: python3 -m compileall -q tools

      - name: Smoke test (fixtures + scan CLI)
        run: python3 tools/scan_forge/verify_smoke.py
